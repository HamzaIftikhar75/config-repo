server:
  port: 8082


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082

      client:
        registration:
          auth-server:
            client-id: demo-client
            client-secret: demo-secret
            authorization-grant-type: client_credentials
            scope: read
            provider: auth-provider
        provider:
          auth-provider:
            token-uri: http://localhost:8082/oauth2/token

