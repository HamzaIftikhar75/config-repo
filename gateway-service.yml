spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: employee-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/emp/**
              filters:
                - TokenRelay=          # 👈 REQUIRED to forward token
                - RewritePath=/api/emp/(?<segment>.*), /api/emp/$\{segment}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082   # Your auth server
      client:
        registration:
          gateway-client:
            provider: auth-server
            client-id: demo-client
            client-secret: demo-secret
            authorization-grant-type: client_credentials
        provider:
          auth-server:
            token-uri: http://localhost:8082/oauth2/token

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true